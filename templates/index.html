<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XNDRSOUND | Loading</title>
    <style>
        /* Modern Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            /* Deep black-grey */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: #ffffff;
            /* Subtle texture overlay */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 70%);
        }

        /* Logo Animation */
        .logo-container {
            width: 70%;
            max-width: 500px;
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeUi 2s ease-out forwards;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            /* Light drop shadow to lift it off the dark bg */
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.05));
        }

        /* Loader Design */
        .loader-wrapper {
            width: 250px;
            text-align: center;
            opacity: 0;
            animation: fadeUi 2s ease-out 0.5s forwards;
            /* Delay the UI items */
        }

        .loader-track {
            width: 100%;
            height: 3px;
            background-color: #333;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .loader-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background-color: #ff3333;
            /* Neon Red Accent */
            background: linear-gradient(90deg, transparent, #ff3333, transparent);
            animation: slide 2s infinite ease-in-out;
        }

        .status-text {
            font-size: 0.75rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: #888;
            font-weight: 600;
        }

        .location-text {
            position: absolute;
            bottom: 2rem;
            font-size: 0.7rem;
            letter-spacing: 0.1rem;
            color: #444;
            opacity: 0;
            animation: fadeUi 2s ease-out 1s forwards;
        }

        /* Animations */
        @keyframes fadeUi {
            to {
                opacity: 1;
            }
        }

        @keyframes slide {
            0% {
                left: -30%;
            }

            100% {
                left: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="logo-container">
        <img src="{{ url_for('static', filename='img/official_logo.png') }}" alt="XNDRSOUND">
    </div>

    <div class="loader-wrapper">
        <div class="loader-track">
            <div class="loader-bar"></div>
        </div>
        <div class="status-text">Under Construction</div>
    </div>

    <div class="location-text">LOS ANGELES, CA</div>

</body>

</html>
